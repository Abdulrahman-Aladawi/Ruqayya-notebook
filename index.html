<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Congratulations Ruqayya!</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div class="notebook-container">
        <div class="photo-header">
            <img src="graduation_photo.jpeg" alt="Ruqayya" id="profile-pic">
            <h1 class="celebrate-title">✨ Congratulations Ruqayya  ✨</h1>
        </div>

        <div class="notebook-page" id="notebook-page" title="Click to turn page">
            <div class="notebook-spine"></div>
            
            <div class="page-content" id="page-content">
                <div class="comment-text" id="comment-text">Reading the beautiful wishes...</div>
                <div class="comment-author" id="comment-author"></div>
                <div class="comment-date" id="comment-date"></div>
            </div>

            <div class="footer-meta">
                <button class="nav-btn prev-btn" id="prev-btn" title="Previous Page">◀ Back</button>
                <span class="tap-hint" id="tap-hint">اضغطي الصفحة لأُمنية جديدة 👆📖</span>
                <span class="page-number" id="page-number">1</span>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
